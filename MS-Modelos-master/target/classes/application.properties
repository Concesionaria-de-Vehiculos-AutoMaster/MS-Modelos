spring.application.name=msmodelo

# Puerto del servidor para MS-Modelos
server.port=8081

# Conexiï¿½n a MariaDB (Asegï¿½rate de que el puerto sea el de tu XAMPP, usualmente 3306)
spring.datasource.url=jdbc:mariadb://localhost:3306/db_modelos?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# Configuraciï¿½n de Hibernate (Spring Data JPA)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Dialecto de MariaDB
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html